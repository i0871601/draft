<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
        <link rel="stylesheet" href="./journal-style.css">
        <!--<link rel="stylesheet" href="./info-style.css">
        <link rel="stylesheet" href="./add-style.css">!-->
    </head>

    <body>
        <input type="checkbox" id="on-Subject" class="input" checked>
        <input type="checkbox" id="on-Class" class="input" checked>

        <input type="radio" name="trigger" id="reset" class="input" checked>

        <main id="Journal">
            <input type="radio" name="trigger" id="subject" class="input">
            <input type="radio" name="trigger" id="class" class="input">

            <div id="bookmarks">

                <label for="class" id="class-marks" class="marks">
                    <p id="text-class">Клас</p>
                    <label for="reset" class="off"></label>
                </label>
            </div>

            <div id="content">
                <div id="select-div">
                    <label for="subject" id="select-subject">
                        <p id="text-subject">Предмет</p>
                        <span class="select-arrow"></span>
                    </label>
                    <label for="reset" class="off"></label>
                    <ul class="content-select"></ul>
                </div>
                
                <div id="Class" class="view">
                    
                </div>
            </div>

            <div id="table">
                <input type="checkbox" id="off-on-journal" class="input">
                <table id="content-journal"></table>
            </div>

        </main>


        <script src="./script-list.js" type="module"></script>
        <script src="./script-journal.js" type="module"></script>


    </body>
</html>
