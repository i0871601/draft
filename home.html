<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
        <link rel="stylesheet" href="./journal-style.css">
        <!--<link rel="stylesheet" href="./info-style.css">
        <link rel="stylesheet" href="./add-style.css">!-->
    </head>

    <body>
        <input type="checkbox" id="on-Subject" class="input" checked>
        <input type="checkbox" id="on-Class" class="input" checked>

        <main id="Journal">
            <input type="checkbox" id="select" class="input">

            <div id="bookmarks">
                <label for="select" id="marks">
                    <h5 id="text">Вибір</h5>
                </label>
            </div>

            <div id="content">
                <label for="select" id="off"></label>
                <div id="choice" class="view">
                    <div id="select-div">
                        <input type="checkbox" id="select-subject" class="input">
                        <label for="select-subject" id="button-subject">
                            <p id="text-subject">Предмет</p>
                            <span class="select-arrow"></span>
                        </label>
                        <ul class="content-select"></ul>
                    </div>
                    <ul id="view-choice"></ul>
                </div>
                <div id="info" class="view"></div>
                <div id="add" class="view"></div>
            </div>

            <div id="table">
                <input type="checkbox" id="off-on-journal" class="input">
                <table id="content-journal"></table>
            </div>

        </main>


        <script src="./script-list.js" type="module"></script>
        <script src="./script-journal.js" type="module"></script>


    </body>
</html>
